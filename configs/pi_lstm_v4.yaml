# configs/pi_lstm_v4.yaml
# PI-LSTM + FusionModel V4 Raman encoder — 23 process + 512 CNN features = 535 total

name: pi_lstm_v4

data:
  csv_path:            ./100_Batches_IndPenSim_V3.csv
  feature_preset:      process_23
  use_raman:           true
  raman_encoder_type:  v4
  raman_ckpt:          ./checkpoints/reakt_fusion_v4_best.pth
  raman_scaler:        ./checkpoints/scaler_raman.pkl
  raman_latent_dim:    512    # FusionModelV4Encoder.FEATURE_DIM
  split_strategy:      random
  train_frac:          0.80
  seed:                42
  min_len:             50

model:
  hidden_size:      64
  num_lstm_layers:  1
  fc_hidden:        32
  lstm_dropout:     0.0
  r_n_init:         45.0
  y_max_n_init:     1.05
  alpha_n_init:     1.0
  beta_n_init:      1.0
  # input_size inferred at runtime: 23 + 512 = 535

training:
  seq_len:      24
  dt:           0.2
  batch_size:   64
  n_epochs:     200
  lr:           1.0e-3
  lr_physics:   1.0e-2
  weight_decay: 1.0e-4
  lr_factor:    0.5
  lr_patience:  15
  es_patience:  30
  grad_clip:    5.0
  vanilla_mode:          false
  lambda_physics_start:  0.0
  lambda_physics_end:    0.1
  lambda_anneal_delay:   30
  lambda_anneal_epochs:  80
  lambda_r_neg:          1.0

output:
  checkpoint: ./checkpoints/pi_lstm_v4.pt
  plots_dir:  ./outputs/pi_lstm_v4/
