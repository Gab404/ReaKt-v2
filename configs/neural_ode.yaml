# configs/neural_ode.yaml
# Neural ODE baseline — 23 process features, no Raman

name: neural_ode

data:
  csv_path:        ./100_Batches_IndPenSim_V3.csv
  feature_preset:  process_23
  use_raman:       false
  split_strategy:  sequential    # matches original paper
  train_frac:      0.80
  seed:            42
  min_len:         50

model:
  n_state:  2      # state: [X_n, P_n]
  hidden:   64     # MLP hidden width
  # n_ctrl is inferred at runtime: len(process_23) = 23

training:
  seg_len:      50
  seg_stride:   10
  dt:           0.2
  batch_size:   64
  n_epochs:     150
  lr:           1.0e-3
  weight_decay: 1.0e-4
  lr_factor:    0.5
  lr_patience:  15
  es_patience:  30
  grad_clip:    5.0
  train_solver: rk4       # fast fixed-step solver during training
  eval_solver:  dopri5    # adaptive solver for evaluation

output:
  checkpoint: ./checkpoints/neural_ode.pt
  plots_dir:  ./outputs/neural_ode/
