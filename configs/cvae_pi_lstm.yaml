# configs/cvae_pi_lstm.yaml
# =========================
# CVAE-PI-LSTM: Physics-Informed LSTM driven exclusively by
# 64-dimensional CVAE latent vectors (posterior means) extracted from Raman spectra.
#
# Input pipeline:
#   raw Raman (2001D) -> SG(d=1, w=15, p=2) -> StandardScaler
#   -> frozen CVAE encoder (mu) -> 64D latent -> MinMaxScaler -> LSTM
#
# The model predicts [pen_norm, r_net] and enforces:
#   DP ~= k_prod * r_net * dt   (penicillin mass balance)
#
# Benchmark split: random seed=42, 72 train / 18 FF-val / 10 fault-test
# Evaluation metric: sparse offline measurement points only (~20/batch)

name: cvae_pi_lstm

data:
  csv_path:         ./100_Batches_IndPenSim_V3.csv
  use_raman:        true
  raman_encoder_type: cvae_v2              # selects CVAERamanEncoderV2
  raman_ckpt:       ./checkpoints/cvae_best.pt
  raman_scaler:     ./checkpoints/cvae_scaler.joblib
  raman_latent_dim: 64                     # CVAE output dimensionality

  # Data split -- must match all other benchmark models
  split_strategy:   random
  train_frac:       0.80
  seed:             42
  min_len:          50

model:
  hidden_size:      64
  num_lstm_layers:  2                      # two layers improves temporal credit
  fc_hidden:        32
  lstm_dropout:     0.2                    # active only with num_layers > 1
  k_prod_init:      1.0                    # initial physics scale k_prod

training:
  seq_len:      24
  dt:           0.2                        # physical time step (h)
  batch_size:   64
  n_epochs:     200

  # Optimizer
  lr:           1.0e-3                     # network parameters
  lr_physics:   1.0e-2                     # k_prod (higher, as in standard PINN)
  weight_decay: 1.0e-4

  # LR scheduler (ReduceLROnPlateau)
  lr_factor:    0.5
  lr_patience:  15

  # Early stopping
  es_patience:  30

  # Gradient clipping
  grad_clip:    5.0

  # Physics annealing schedule
  vanilla_mode:          false             # false = use physics loss
  lambda_physics_start:  0.0
  lambda_physics_end:    0.1
  lambda_anneal_delay:   30               # warmup epochs (data loss only)
  lambda_anneal_epochs:  80               # epochs for linear ramp

output:
  checkpoint: ./checkpoints/cvae_pi_lstm.pt
  plots_dir:  ./outputs/cvae_pi_lstm/
